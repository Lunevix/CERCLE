name: Auto-fix Linting

on:
  push:
    branches: [main, develop]

permissions:
  contents: write

jobs:
  fix-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint:fix --workspace=backend || true
      - run: npm run lint:fix --workspace=frontend || true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix linting errors"